# Production Airflow 3.1.6 with CeleryExecutor for IGH Data Pipeline
#
# This configuration is for production deployment with Traefik reverse proxy
# and Let's Encrypt TLS certificates.
#
# Prerequisites:
#   cp .env.example .env  # Edit with production values
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose ps
#
# With Flower (Celery monitoring):
#   docker compose --profile flower up -d
#
---
x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: ${AIRFLOW_IMAGE_NAME}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__API_AUTH__JWT_ISSUER: airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # IGH Data Pipeline: data paths
    BRONZE_DB_PATH: ${BRONZE_DB_PATH:-/opt/airflow/data/bronze/dataverse.db}
    SILVER_DB_PATH: ${SILVER_DB_PATH:-/opt/airflow/data/silver/igh_silver.db}
    PRODUCTION_DB_PATH: ${PRODUCTION_DB_PATH:-/opt/airflow/data/production/igh.db}
    # IGH Data Pipeline: DAG schedules
    INGESTION_SCHEDULE: ${INGESTION_SCHEDULE:-0 2 * * *}
    TRANSFORM_SCHEDULE: ${TRANSFORM_SCHEDULE:-0 4 * * *}
    DEPLOYMENT_SCHEDULE: ${DEPLOYMENT_SCHEDULE:-0 6 * * *}
    # IGH Data Pipeline: Dataverse credentials
    DATAVERSE_API_URL: ${DATAVERSE_API_URL}
    DATAVERSE_CLIENT_ID: ${DATAVERSE_CLIENT_ID}
    DATAVERSE_CLIENT_SECRET: ${DATAVERSE_CLIENT_SECRET}
    DATAVERSE_SCOPE: ${DATAVERSE_SCOPE}
    # IGH Data Pipeline: Slack alerts
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  volumes:
    # Production: only runtime data volumes (code is baked into image)
    - airflow-logs:/opt/airflow/logs
    - airflow-data:/opt/airflow/data
  user: "50000:0"
  security_opt:
    - no-new-privileges:true
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  traefik:
    image: traefik:v3.6.7
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.http.address=:80"
      - "--entrypoints.https.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.http.http.redirections.entryPoint.to=https"
      - "--entrypoints.http.http.redirections.entryPoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    security_opt:
      - no-new-privileges:true

  redis:
    # Using 7.2-bookworm as Redis switched to SSPL license after 7.2
    image: redis:7.2-bookworm
    expose:
      - 6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    security_opt:
      - no-new-privileges:true

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.igh-airflow.rule=Host(`${AIRFLOW_DOMAIN}`)"
      - "traefik.http.routers.igh-airflow.entrypoints=https"
      - "traefik.http.routers.igh-airflow.tls=true"
      - "traefik.http.routers.igh-airflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.igh-airflow.loadbalancer.server.port=8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Creating data directories..."
        mkdir -p /opt/airflow/{logs,data}
        mkdir -p /opt/airflow/data/{bronze,silver,production}
        echo "Setting ownership..."
        chown -R "50000:0" /opt/airflow/logs /opt/airflow/data
        echo "Airflow version:"
        /entrypoint airflow version
        echo "Done!"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    user: "0:0"
    security_opt: []

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow

  flower:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
    name: igh-airflow-postgres
  airflow-logs:
    name: igh-airflow-logs
  airflow-data:
    name: igh-airflow-data
  letsencrypt:
    name: igh-airflow-letsencrypt
