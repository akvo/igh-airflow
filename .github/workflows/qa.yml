name: Lint & Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-groups

      - name: Run Ruff (linting)
        run: uv run ruff check dags/ config/ tests/

      - name: Run Ruff (formatting check)
        run: uv run ruff format --check dags/ config/ tests/

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=dags --cov=config --cov-report=term-missing
